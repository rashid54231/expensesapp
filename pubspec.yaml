name: expenses_app
description: A Flutter app to track expenses using Supabase
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Supabase
  supabase_flutter: ^2.12.0

  # For formatting dates and numbers
  intl: ^0.19.0

  # State management (optional)
  provider: ^6.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^2.0.1

flutter:
  uses-material-design: true

  # Assets folder (if you want images/icons later)
